name: Count Arduino Files

on: 
  push:

jobs:
  count-ino-files:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Count .ino files
        run: |
          python -c "
          import glob
          files = glob.glob('**/*.ino', recursive=True)
          print('====================================')
          print(f'Total .ino files found in repository: {len(files)}')
          print('====================================')
          "
